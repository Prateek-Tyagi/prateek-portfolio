name: Deploy site

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "cv.md"
      - "cv-template.html"
      - "build-cv.sh"
      - "favicon.ico"
      - "site.webmanifest"
      - "assets/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

# No long-lived AWS keys: the job mints short-lived credentials via OIDC.
permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-site
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      # cv.html + cv.pdf are GENERATED from cv.md (never committed).
      - name: Build CV from cv.md
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y pandoc libpango-1.0-0 libpangocairo-1.0-0 libgdk-pixbuf-2.0-0 libffi-dev
          python3 -m pip install "weasyprint==69.0"
          chmod +x build-cv.sh && ./build-cv.sh

      # src/ = site HTML (except generated CV). Root cv.html/cv.pdf from the
      # build step; favicon.ico + site.webmanifest + assets/ synced separately.
      # Extra syncs omit --delete so earlier uploads stay intact.
      - name: Sync site to S3
        run: |
          aws s3 sync src/ "s3://${{ secrets.S3_BUCKET }}" \
            --delete \
            --exclude "*" \
            --include "*.html" \
            --include "*.pdf" \
            --cache-control "public, max-age=300, must-revalidate"

          # Generated CV at repo root → bucket root (/cv.html, /cv.pdf).
          aws s3 sync . "s3://${{ secrets.S3_BUCKET }}" \
            --exclude "*" \
            --include "cv.html" \
            --include "cv.pdf" \
            --include "favicon.ico" \
            --include "site.webmanifest" \
            --cache-control "public, max-age=300, must-revalidate"

          aws s3 sync assets/ "s3://${{ secrets.S3_BUCKET }}/assets" \
            --exclude "*" \
            --include "*.png" \
            --cache-control "public, max-age=86400"

          # Social preview image at bucket root (og:image → /og.png).
          aws s3 cp assets/og.png "s3://${{ secrets.S3_BUCKET }}/og.png" \
            --cache-control "public, max-age=86400" \
            --content-type "image/png"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}" \
            --paths "/*"
