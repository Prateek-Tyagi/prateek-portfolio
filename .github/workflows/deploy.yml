name: Deploy site

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "favicon.ico"
      - "site.webmanifest"
      - "assets/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

# No long-lived AWS keys: the job mints short-lived credentials via OIDC.
permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-site
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      # src/ = HTML + PDF. favicon.ico + site.webmanifest at repo root; PNG
      # icons under assets/. Extra syncs omit --delete so HTML/PDF stay intact.
      - name: Sync site to S3
        run: |
          aws s3 sync src/ "s3://${{ secrets.S3_BUCKET }}" \
            --delete \
            --exclude "*" \
            --include "*.html" \
            --include "*.pdf" \
            --cache-control "public, max-age=300, must-revalidate"

          # Root favicon.ico + manifest, and PNG icons under assets/
          # (no --delete — must not wipe HTML/PDF from the earlier sync).
          aws s3 sync . "s3://${{ secrets.S3_BUCKET }}" \
            --exclude "*" \
            --include "favicon.ico" \
            --include "site.webmanifest" \
            --cache-control "public, max-age=86400"

          aws s3 sync assets/ "s3://${{ secrets.S3_BUCKET }}/assets" \
            --exclude "*" \
            --include "*.png" \
            --cache-control "public, max-age=86400"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}" \
            --paths "/*"
