name: Deploy site

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

# No long-lived AWS keys: the job mints short-lived credentials via OIDC.
permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-site
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      # src/ is the web root. Sync its HTML to the bucket root; terraform/,
      # .github/, .git/, README and *.md all live outside src/, so they never
      # ship. aws s3 sync infers Content-Type from the extension (text/html).
      - name: Sync site to S3
        run: |
          aws s3 sync src/ "s3://${{ secrets.S3_BUCKET }}" \
            --delete \
            --exclude "*" \
            --include "*.html" \
            --cache-control "public, max-age=300, must-revalidate"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}" \
            --paths "/*"
