<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>$name$ — CV</title>
<meta name="description" content="Curriculum vitae of $name$, $role$.">
<link rel="icon" href="/favicon.ico" sizes="any">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root{
    /* Match Joseph Coleman accent for Download PDF CTA */
    --accent:#0f766e; --accent-deep:#0b5750; --tint:#e6f0ef;
    --ink:#14201f; --muted:#5c6a6b; --rule:#dde4e2; --paper:#fff; --bg:#eceff1; --nav-h:60px;
    --disp:'Sora',-apple-system,'Segoe UI',sans-serif;
    --body:'Inter',-apple-system,'Segoe UI','Helvetica Neue',Arial,sans-serif;
    --mono:'JetBrains Mono',ui-monospace,Menlo,Consolas,monospace;
  }
  /* Tight page margins so full content fits two A4 pages without cutting copy */
  @page{ size:A4; margin:10mm 12mm; }
  *{box-sizing:border-box}
  html{ font-family:var(--body); color:var(--ink); line-height:1.32; -webkit-font-smoothing:antialiased; }
  body{ margin:0; }

  /* nav (screen only) */
  .site-nav{position:fixed;top:0;left:0;right:0;height:var(--nav-h);display:flex;align-items:center;
    background:rgba(255,255,255,.9);backdrop-filter:saturate(140%) blur(10px);border-bottom:1px solid var(--rule);z-index:100}
  .nav-inner{width:100%;max-width:900px;margin:0 auto;padding:0 20px;display:flex;align-items:center;justify-content:space-between}
  .nav-brand{font-family:var(--mono);font-weight:600;font-size:14px;color:var(--ink);text-decoration:none;display:flex;align-items:center;gap:8px}
  .nav-brand .dot{width:7px;height:7px;border-radius:50%;background:var(--accent)}
  .nav-brand span{color:var(--muted)}
  .nav-links{display:flex;align-items:center;gap:20px;list-style:none;margin:0;padding:0}
  .nav-links a{text-decoration:none;color:var(--muted);font-size:13.5px;font-weight:500}
  .nav-links a:hover{color:var(--ink)}
  .nav-links a.current{color:var(--accent-deep);font-weight:600}
  /* Joseph Coleman Download PDF CTA (site.css .nav-link.is-page.current) */
  .nav-link.is-page{
    color:var(--accent-deep);border:1px solid var(--accent);border-radius:6px;
    padding:6px 12px;font-weight:500}
  .nav-link.is-page:hover{background:var(--tint);color:var(--accent-deep)}
  .nav-link.is-page.current{background:var(--accent);color:#fff;border-color:var(--accent)}
  .nav-link.is-page.current:hover{background:var(--accent);color:#fff}
  @media (max-width:640px){.nav-links a:not(.current):not(.is-page){display:none}}

  /* A4 sheet — dense on screen and print */
  .sheet{ max-width:210mm; margin:0 auto; padding:10mm 12mm; background:var(--paper); }
  @media screen{
    html{ background:var(--bg); }
    body{ padding:calc(var(--nav-h) + 26px) 14px 40px; }
    .sheet{ min-height:297mm; border-radius:3px; box-shadow:0 1px 2px rgba(0,0,0,.06),0 14px 38px rgba(20,40,50,.13); }
  }

  /* masthead */
  .name{ font-family:var(--disp); font-size:20pt; font-weight:600; text-align:center; margin:0 0 1pt; letter-spacing:.01em; }
  .subtitle{ text-align:center; font-family:var(--mono); font-size:8pt; font-weight:600; text-transform:uppercase; letter-spacing:.16em; color:var(--accent); margin:0 0 5pt; }
  .contact{ text-align:center; color:var(--muted); font-size:8.2pt; line-height:1.45; margin:0 0 2pt; }
  .contact a{ color:var(--muted); text-decoration:none; } .contact .sep{ margin:0 4pt; color:var(--rule); }
  .rule-top{ border:none; border-top:1px solid var(--rule); margin:6pt 0 0; }

  /* pandoc body: sections + entries — keep all content, pack vertically */
  .sheet h2{ font-size:8.5pt; font-weight:700; text-transform:uppercase; letter-spacing:.11em; color:var(--accent);
    border-bottom:1.25px solid var(--accent); padding-bottom:2pt; margin:8pt 0 4pt; }
  .sheet h3{ font-family:var(--disp); font-size:10pt; font-weight:600; color:var(--ink); margin:5pt 0 0;
    display:flex; justify-content:space-between; align-items:baseline; gap:8px; }
  .sheet h3 .when{ font-family:var(--mono); font-size:8pt; font-weight:500; color:var(--muted); white-space:nowrap; }
  .sheet h3 + p{ color:var(--muted); font-size:8.5pt; margin:0 0 2pt; }
  .sheet h3 + p strong{ color:var(--accent-deep); font-weight:600; }
  .sheet p{ font-size:8.7pt; margin:1.5pt 0; }
  .sheet ul{ margin:1pt 0 3pt; padding-left:12pt; list-style:none; }
  .sheet li{ position:relative; margin-bottom:1.2pt; padding-left:3pt; font-size:8.7pt; }
  .sheet li::before{ content:""; position:absolute; left:-7pt; top:4pt; width:3px; height:3px; background:var(--accent); border-radius:50%; }
  .sheet strong{ color:var(--ink); font-weight:600; }
  .sheet h2 + p strong, .sheet h2 ~ p > strong:first-child{ color:var(--accent-deep); }

  [class^="ico-"]::before{ content:""; display:inline-block; width:.86em; height:.86em; vertical-align:-.14em; background-repeat:no-repeat; background-position:center; background-size:contain; margin-right:.24em; }
  .ico-pin::before{background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%235c6a6b' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><path d='M20 10c0 7-8 12-8 12s-8-5-8-12a8 8 0 0 1 16 0Z'/><circle cx='12' cy='10' r='3'/></svg>")}
  .ico-mail::before{background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%235c6a6b' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><rect width='20' height='16' x='2' y='4' rx='2'/><path d='m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7'/></svg>")}
  .ico-phone::before{background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%235c6a6b' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><path d='M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.13.96.36 1.9.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.9.34 1.85.57 2.81.7A2 2 0 0 1 22 16.92Z'/></svg>")}
  .ico-globe::before{background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%235c6a6b' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><circle cx='12' cy='12' r='10'/><path d='M12 2a14.5 14.5 0 0 0 0 20 14.5 14.5 0 0 0 0-20'/><path d='M2 12h20'/></svg>")}
  .ico-linkedin::before{background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%235c6a6b'><path d='M20.45 20.45h-3.55v-5.57c0-1.33-.03-3.04-1.85-3.04-1.85 0-2.14 1.45-2.14 2.94v5.67H9.35V9h3.41v1.56h.05c.48-.9 1.64-1.85 3.37-1.85 3.6 0 4.27 2.37 4.27 5.46v6.28zM5.34 7.43a2.06 2.06 0 1 1 0-4.13 2.06 2.06 0 0 1 0 4.13zM7.12 20.45H3.56V9h3.56v11.45zM22.22 0H1.77C.79 0 0 .77 0 1.73v20.54C0 23.23.79 24 1.77 24h20.45c.98 0 1.78-.77 1.78-1.73V1.73C24 .77 23.2 0 22.22 0z'/></svg>")}
  .ico-github::before{background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%235c6a6b'><path d='M12 .3a12 12 0 0 0-3.8 23.4c.6.1.8-.3.8-.6v-2c-3.3.7-4-1.6-4-1.6-.6-1.4-1.3-1.8-1.3-1.8-1.1-.7 0-.7 0-.7 1.2 0 1.8 1.2 1.8 1.2 1.1 1.8 2.8 1.3 3.5 1 .1-.8.4-1.3.8-1.6-2.7-.3-5.5-1.3-5.5-5.9 0-1.3.5-2.4 1.2-3.2 0-.4-.5-1.6.2-3.2 0 0 1-.3 3.3 1.2a11.5 11.5 0 0 1 6 0C17.3 4.7 18.3 5 18.3 5c.7 1.6.2 2.8.1 3.2.8.8 1.2 1.9 1.2 3.2 0 4.6-2.8 5.6-5.5 5.9.5.3.9 1 .9 2.2v3.3c0 .3.2.7.8.6A12 12 0 0 0 12 .3z'/></svg>")}

  @media print{
    .site-nav{ display:none !important; }
    html,body{ padding:0; margin:0; background:#fff; }
    .sheet{ box-shadow:none; border-radius:0; margin:0; padding:0; max-width:none; min-height:0 !important; }
    a{ color:var(--accent-deep); text-decoration:none; }
    /* Never force a whole job block to the next page (causes empty first-page gaps) */
    .sheet li, .sheet h2, .sheet h3, .sheet h3 + p{ break-inside:avoid; page-break-inside:avoid; }
    .sheet h2{ break-after:avoid; page-break-after:avoid; }
  }
</style>
</head>
<body>
<header class="site-nav">
  <div class="nav-inner">
    <a class="nav-brand" href="index.html"><span class="dot"></span>prateek.rajvats<span> / platform·sre</span></a>
    <ul class="nav-links">
      <li><a href="index.html#about">About</a></li>
      <li><a href="index.html#experience">Experience</a></li>
      <li><a href="index.html#work">Work</a></li>
      <li><a href="index.html#skills">Skills</a></li>
      <li><a class="current" href="cv.html">CV</a></li>
      <li><a class="nav-link is-page current" href="cv.pdf" download="Prateek-Rajvats-CV.pdf">Download PDF</a></li>
    </ul>
  </div>
</header>

<main class="sheet">
  <h1 class="name">$name$</h1>
  <p class="subtitle">$if(tagline)$$tagline$$else$$role$$endif$</p>
  <p class="contact">
    <span class="ico-pin"></span>$location$ <span class="sep">·</span>
    <span class="ico-phone"></span>$phone$ <span class="sep">·</span>
    <span class="ico-mail"></span><a href="mailto:$email$">$email$</a> <span class="sep">·</span>
    <span class="ico-globe"></span><a href="https://$website$">$website$</a><br>
    <span class="ico-linkedin"></span><a href="https://$linkedin$">$linkedin$</a> <span class="sep">·</span>
    <span class="ico-github"></span><a href="https://$github$">$github$</a>
  </p>
  <hr class="rule-top">
$body$
</main>
</body>
</html>
